<head>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Roboto',sans-serif;background:#0f0f0f;color:white;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow-x:hidden;}
    
    .whatsapp-container{
      width:100%; max-width:440px; background:#111; border:1px solid #333; border-radius:12px; overflow:hidden; box-shadow:0 0 30px rgba(0,0,0,0.8);
    }

    /* Header WhatsApp */
    .header{
      background:#075e54; padding:12px 16px; display:flex; align-items:center; gap:12px; color:white;
    }
    .header img{width:32px; height:32px;}
    .header h1{font-size:19px; font-weight:500;}

    .nav{
      background:#202020; padding:10px; display:flex; justify-content:space-between; font-size:14px; border-bottom:1px solid #333;
    }
    .nav a{color:#ddd; text-decoration:none; padding:6px 10px;}
    .nav .active{color:#25d366; border-bottom:2px solid #25d366;}

    /* Contenido principal */
    .content{
      padding:40px 20px 30px; text-align:center; background:#0f0f0f; min-height:420px;
    }

    .logo-circle{
      width:110px; height:110px; background:#000; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px rgba(255,215,0,0.6);
    }
    .logo-circle img{width:80px;}

    .title{color:white; font-size:28px; font-weight:700; margin-bottom:8px;}
    .subtitle{color:#bbb; font-size:15px; margin-bottom:30px;}

    /* Chat bubble */
    .chat-bubble{
      background:#202c33; color:white; padding:16px 20px; border-radius:18px; border-bottom-left-radius:4px; max-width:280px; margin:0 auto 40px; text-align:left; font-size:15.5px; line-height:1.4;
    }

    /* Botones */
    .btn-green{
      background:#25d366; color:black; font-weight:700; font-size:17px; padding:16px; border-radius:999px; text-decoration:none; display:block; margin:14px auto; width:85%; max-width:300px; box-shadow:0 4px 12px rgba(37,211,102,0.4);
    }
    .btn-outline{
      background:transparent; color:#ddd; border:1px solid #555; font-weight:500; padding:14px; border-radius:999px; text-decoration:none; display:block; margin:14px auto; width:85%; max-width:300px;
    }

    .download-link{
      color:#25d366; text-decoration:underline; font-size:14.5px; margin-top:20px; display:inline-flex; align-items:center; gap:6px;
    }

    .footer{
      background:#1f1f1f; padding:12px; text-align:center; font-size:13px; color:#888;
    }
  </style>
</head>
<body>

  <div class="whatsapp-container">

    <!-- Header estilo WhatsApp -->
    <div class="header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/WhatsApp.svg/512px-WhatsApp.svg.png" alt="WhatsApp">
      <h1>WhatsApp</h1>
    </div>

    <!-- Navegación -->
    <div class="nav">
      <a href="#" class="active">Chats</a>
      <a href="#">Estado</a>
      <a href="#">Comunidades</a>
      <a href="#">Llamadas</a>
    </div>

    <div class="content">

      <!-- Logo ARES -->
      <div class="logo-circle">
        <img src="https://i.imgur.com/YourAresLogo.png" alt="ARES" onerror="this.src='https://via.placeholder.com/80/000/FFD700?text=ARES';">
      </div>

      <div class="title">Crown Best</div>
      <div class="subtitle">Lucky Crown</div>

      <!-- Mensaje de chat -->
      <div class="chat-bubble">
        Hola! Vi la página de Lucky Crown y quiero crear mi usuario gratis para aprovechar el bonus del 50%.
      </div>

      <!-- Botones principales -->
      <a href="#" class="btn-green" id="btn1">Abrir aplicación</a>
      <a href="#" class="btn-outline" id="btn2">Continuar en WhatsApp Web</a>

      <a href="#" class="download-link" id="btn3">
        <span>📲</span> ¿No tienes la aplicación? Descárgala ahora
      </a>

    </div>

    <div class="footer">
      +18 · Juega con responsabilidad
    </div>
  </div>

  <script>
    const contactos = [
      { 
        numero: "5491127872686", 
        mensaje: "Hola! Vi la página de Lucky Crown y quiero crear mi usuario gratis para aprovechar el bono de bienvenida del 50%." 
      },
      { 
        numero: "5491127802342", 
        mensaje: "¡Buenas! Me interesa registrarme en Lucky Crown. ¿Me podés ayudar con el bono de primer depósito?" 
      }
    ];

    let contactoActual = contactos[0];

    function actualizarContacto() {
      contactoActual = contactos[Math.floor(Math.random() * contactos.length)];
    }

    function abrirWhatsApp() {
      const texto = encodeURIComponent(contactoActual.mensaje);
      const url = `https://wa.me/${contactoActual.numero}?text=${texto}`;
      window.open(url, '_blank');
      fbq('track', 'Contact');
    }

    // Asignar eventos
    document.getElementById('btn1').addEventListener('click', abrirWhatsApp);
    document.getElementById('btn2').addEventListener('click', abrirWhatsApp);
    document.getElementById('btn3').addEventListener('click', abrirWhatsApp);

    actualizarContacto();
    setInterval(actualizarContacto, 5 * 60 * 1000);
  </script>
</body>
